<style>
  :root{
    --amber:#F0A82E; --amber-dark:#D08F1B;
    --teal:#0E7C8C; --ink:#0B1D2E;
    --good:#3FA65C; --bad:#D9534F; --warn:#E5A93D; --cyan:#35C4D7;
    --t1:#3E7BD6; --t2:#3FA65C; --t5:#E08A2E; --t10:#8B5CC7;
    --bubble:rgba(8,14,22,.88);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:#050D16;overflow:hidden;
    font-family:"Trebuchet MS","Segoe UI",Verdana,sans-serif;color:#fff;}
  #topbar{position:fixed;top:0;left:0;right:0;height:48px;background:#0E7C8C;
    display:flex;align-items:center;gap:14px;padding:0 16px;z-index:50;
    box-shadow:0 2px 8px rgba(0,0,0,.35);}
  #topbar .logo{font-weight:700;letter-spacing:.4px;font-size:15px;white-space:nowrap;}
  #topbar .logo span{color:#FFD98A;}
  #phasedots{display:flex;gap:6px;align-items:center;background:rgba(255,255,255,.18);
    border-radius:999px;padding:5px 10px;margin:0 auto;}
  .pdot{width:11px;height:11px;border-radius:50%;border:2px solid #fff;opacity:.45;transition:.3s;}
  .pdot.done{background:#fff;opacity:.9;}
  .pdot.cur{background:#FFD98A;border-color:#FFD98A;opacity:1;transform:scale(1.25);}
  .tbtn{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.4);color:#fff;
    border-radius:8px;padding:5px 11px;font-size:13px;cursor:pointer;font-family:inherit;}
  .tbtn:hover{background:rgba(255,255,255,.3);}
  /* opening-video screen: hide the teal bar & game-name, keep dots/sound/restart in place */
  #topbar.video-mode{background:transparent;box-shadow:none;}
  #topbar.video-mode .logo{visibility:hidden;}
  /* home screen: no chrome at all (bar + dots + sound + restart all hidden) */
  #topbar.home-hidden{display:none;}

  #stagewrap{position:fixed;top:48px;left:0;right:0;bottom:0;
    display:flex;align-items:center;justify-content:center;background:#08131F;}
  #bgwall{position:absolute;inset:0;overflow:hidden;}
  #stage{position:relative;width:1440px;height:900px;transform-origin:center center;
    flex:none;}/* never let the flex parent shrink the stage before it is scaled to fit */

  /* ---------- scene backgrounds on #bgwall — always full screen ---------- */
  .bgfill{position:absolute;inset:0;}
  .scene-stall .bgfill{background:linear-gradient(180deg,#2C4A3E 0%,#6B4F2E 55%,#4A3521 100%);}
  .scene-room  .bgfill{background:linear-gradient(180deg,#123A4A 0%,#0E2C3E 60%,#0A2130 100%);}
  .scene-test  .bgfill{background:linear-gradient(180deg,#0D2836 0%,#0A1F2E 60%,#071723 100%);}
  .scene-gallery .bgfill{background:linear-gradient(180deg,#2A1F3D 0%,#1B1430 70%,#120D22 100%);}
  img.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .dim{position:absolute;inset:0;background:rgba(5,12,20,.45);}
  .dim.deep{background:rgba(5,12,20,.66);}
  /* character/prop art: true transparent cutouts (ML background removal) */
  .cutout{object-fit:contain;filter:drop-shadow(0 10px 18px rgba(0,0,0,.45));}

  .layer{position:absolute;inset:0;}
  .fade-in{animation:fadeIn .45s ease both;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}

  /* ---------- headline / speech ---------- */
  .headline{position:absolute;top:64px;left:0;width:100%;text-align:center;
    font-size:46px;font-weight:700;color:#F2F7FA;text-shadow:0 2px 10px rgba(0,0,0,.5);}
  #bubble{position:absolute;left:50%;bottom:56px;transform:translateX(-50%);
    max-width:660px;min-width:340px;background:var(--bubble);border-radius:10px;
    padding:18px 52px 18px 22px;font-size:25px;line-height:1.45;color:#fff;z-index:30;
    box-shadow:0 6px 24px rgba(0,0,0,.45);}
  #bubble .replay{position:absolute;right:8px;top:8px;width:34px;height:34px;border-radius:50%;
    border:none;background:rgba(255,255,255,.14);color:#fff;font-size:17px;cursor:pointer;}
  #bubble .replay:hover{background:rgba(255,255,255,.3);}
  #bubble .tapHint{position:absolute;right:14px;bottom:6px;font-size:13px;opacity:.55;}
  #tapzone{position:absolute;inset:0;z-index:25;cursor:pointer;}

  /* ---------- buttons ---------- */
  .bigbtn{position:absolute;border:none;border-radius:10px;cursor:pointer;
    font-family:inherit;font-weight:700;transition:transform .12s, filter .12s;
    box-shadow:0 4px 14px rgba(0,0,0,.4);}
  .bigbtn:hover{filter:brightness(1.08);transform:translateY(-2px);}
  .bigbtn:active{transform:translateY(1px);}
  .bigbtn:disabled{filter:grayscale(.6) brightness(.75);cursor:default;transform:none;}
  .primary{right:28px;bottom:28px;background:var(--amber);color:#fff;
    font-size:28px;padding:18px 44px;z-index:28;}
  .secondary{left:56px;bottom:52px;background:#C4CCD2;color:#33414D;
    font-size:24px;padding:16px 34px;z-index:28;}

  /* ---------- home / title screen (CoinBot — Sort Smarter!) ----------
     Positioned & sized against the stage (always fully visible, always 900 tall),
     so the title holds its on-screen spot & size at every window aspect ratio. */
  #homeTitle{position:absolute;left:50%;top:29%;text-align:center;transform-origin:center center;
    transform:translate(-50%,-50%);z-index:22;pointer-events:none;
    font-family:'Fredoka','Baloo 2','Nunito','Segoe UI',system-ui,sans-serif;
    animation:homeIn .55s ease-out both;}
  @keyframes homeIn{from{opacity:0;transform:translate(-50%,-58%);}
    to{opacity:1;transform:translate(-50%,-50%);}}
  /* bright cyan glow around the whole logo (not a dark shadow) */
  .ct-word{position:relative;display:block;line-height:.9;
    filter:drop-shadow(0 0 8px rgba(103,226,255,.9)) drop-shadow(0 0 20px rgba(45,180,245,.55));}
  .ct-layer{display:block;font-weight:700;font-size:222px;line-height:.9;white-space:nowrap;
    margin:0;letter-spacing:-3px;}
  /* outer navy outline + a small depth shadow (bottom-most layer defines the box) */
  .ct-outer{color:#174A72;-webkit-text-stroke:5px #174A72;
    text-shadow:0 5px 0 #175F92,0 9px 12px rgba(3,24,40,.35);}
  /* pale inner outline drawn over the navy → letters read as illuminated */
  .ct-inner{color:#E8FBFF;-webkit-text-stroke:2px #E8FBFF;}
  .ct-inner,.ct-fill,.ct-hi,.ct-anchor{position:absolute;left:0;top:0;right:0;}
  /* two-tone gradient fills over the strokes: Coin = cyan, Bot = violet */
  .ct-fill{color:transparent;-webkit-text-fill-color:transparent;}
  .fc-coin,.fc-bot{-webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;}
  .fc-coin{background-image:linear-gradient(180deg,#8EEBFF 0%,#31C8F4 52%,#159CE0 100%);}
  .fc-bot{background-image:linear-gradient(180deg,#B1A2FF 0%,#7A72F2 52%,#5A54D6 100%);}
  .ct-hi{background:linear-gradient(180deg,rgba(255,255,255,.8) 0%,rgba(255,255,255,0) 22%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
  .ct-anchor{color:transparent;-webkit-text-fill-color:transparent;} /* invisible; only positions the i light */
  .ct-i{position:relative;} /* dotless ı in every layer → the scanner light IS the tittle */
  .ct-i::after{content:'';position:absolute;left:50%;top:.02em;transform:translateX(-50%);
    width:.2em;height:.2em;border-radius:50%;
    background:radial-gradient(circle,#F2FEFF 0%,#7CE7FF 34%,#35C4D7 68%,rgba(53,196,215,0) 100%);
    box-shadow:0 0 11px 3px rgba(124,231,255,.95),0 0 26px 7px rgba(53,196,215,.55);
    animation:scanPulse 1.9s ease-in-out infinite;}
  @keyframes scanPulse{0%,100%{opacity:.85;transform:translateX(-50%) scale(1);}
    50%{opacity:1;transform:translateX(-50%) scale(1.18);}}
  /* warm, bright child-friendly tagline pill */
  .ct-sub{display:inline-block;margin-top:18px;font-family:'Nunito','Fredoka',sans-serif;
    font-weight:800;font-size:66px;letter-spacing:2px;line-height:1;color:#4A2B00;
    text-transform:uppercase;background:#FFB92E;border:3px solid #FFE58A;border-radius:999px;
    padding:12px 48px;box-shadow:0 6px 0 #D78316;}
  /* Start tab — pinned to the counter, scaled with the scene; custom (no .bigbtn hover-transform) */
  #homeStart{position:absolute;left:50%;top:72%;transform-origin:center center;
    transform:translate(-50%,-50%);z-index:24;cursor:pointer;border:none;
    font-family:'Fredoka','Nunito',system-ui,sans-serif;font-weight:700;font-size:44px;
    color:#fff;padding:18px 62px;border-radius:18px;letter-spacing:.5px;
    background:linear-gradient(180deg,#F6B640 0%,#F0A82E 55%,#D08F1B 100%);
    box-shadow:0 8px 22px rgba(0,0,0,.4),inset 0 2px 0 rgba(255,255,255,.35);
    animation:startPulse 1.6s ease-in-out infinite;}
  #homeStart:hover{filter:brightness(1.06);}
  #homeStart:active{filter:brightness(.96);}
  @keyframes startPulse{0%,100%{box-shadow:0 8px 22px rgba(0,0,0,.4),0 0 0 0 rgba(240,168,46,.5),inset 0 2px 0 rgba(255,255,255,.35);}
    50%{box-shadow:0 8px 22px rgba(0,0,0,.4),0 0 0 14px rgba(240,168,46,0),inset 0 2px 0 rgba(255,255,255,.35);}}
  .label-btn{position:static;background:#fff;color:#2A3742;font-size:26px;padding:16px 30px;
    min-width:170px;display:flex;align-items:center;gap:10px;justify-content:center;}
  .label-btn .ic{font-size:24px;}
  .label-btn.reject{background:#E76A66;color:#fff;}
  .label-btn.flash{background:var(--good) !important;color:#fff !important;}
  .label-btn.denom{min-width:130px;flex-direction:column;gap:2px;padding:12px 24px;}
  .label-btn.denom small{font-size:13px;font-weight:400;opacity:.75;}

<body>
<header id="topbar">
  <div class="logo">🪙 Coin<span>Bot</span> · <span>Sort Smarter</span></div>
  <div id="phasedots"></div>
  <button class="tbtn" id="muteBtn" title="Sound on/off">🔊</button>
  <button class="tbtn" id="restartBtn" title="Restart">↻ Restart</button>
</header>
<div id="stagewrap"><div id="bgwall"></div><div id="stage"></div></div>

<script>
/* =====================================================================
   Fruit Stall Coin Sorter — single-file build.
   All art loads from Visuals/ by contract filenames; when a file is
   missing, a generated SVG placeholder is used instead, so the game is
   fully playable before final assets arrive. Audio from Audio/ is
   optional and fails silently.
   ===================================================================== */

/* ---------------- utils ---------------- */
const $=s=>document.querySelector(s);
const stage=$('#stage');
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
const uri=svg=>'data:image/svg+xml;utf8,'+encodeURIComponent(svg);

/* ---------------- audio (optional files) ---------------- */
let muted=false;
const sfxCache={};
function sfx(name){
  if(muted)return;
  try{
    if(!sfxCache[name])sfxCache[name]=new Audio('Audio/'+name+'.mp3');
    const a=sfxCache[name].cloneNode();a.volume=.5;a.play().catch(()=>{});
  }catch(e){}
}
$('#muteBtn').onclick=()=>{muted=!muted;$('#muteBtn').textContent=muted?'🔇':'🔊';};
$('#restartBtn').onclick=()=>{if(confirm('Restart the whole mission?'))location.reload();};

/* ---------------- placeholder SVG factories ---------------- */
const DENOM_STYLE={
  1:{metal:'#C9CFD6',edge:'#9AA3AC',size:.78},
  2:{metal:'#CDD4DB',edge:'#9AA3AC',size:.86},
  5:{metal:'#D9B65C',edge:'#A8863B',size:.92},

function initL1Pool(){
  L1_BY_D={};
  for(const d of DENOMS)L1_BY_D[d]=(HAS_REAL
    ?CURATED[d].train.concat(CURATED[d].test,CURATED[d].retrain).map(fr=>findK(d,fr)).filter(Boolean)
    :[`${d}-a-clear`,`${d}-b-clear`,`${d}-c-clear`,`${d}-a-faded`,`${d}-b-worn`]);
  // ₹20 is NOT used in L1; instead add extra ₹1 & ₹2 designs that are different
  // from every ₹1/₹2 coin used in the value lessons
  if(HAS_REAL)for(const d of [1,2]){
    const extra=RC_BY_D[d].filter(k=>!L1_BY_D[d].includes(k)).slice(0,3);
    L1_BY_D[d].push(...extra);
  }
  L1_COINS=[].concat(...DENOMS.map(d=>L1_BY_D[d])).map(C);
}
function buildL1Deck(n=40){
  // guarantee ≥3 designs of every denomination (incl. ₹20), then top up randomly
  const keys=[];
  for(const d of Object.keys(L1_BY_D))keys.push(...shuffle(L1_BY_D[d]).slice(0,3));
  const extra=shuffle([].concat(...Object.values(L1_BY_D)).filter(k=>!keys.includes(k)));
  const coinTarget=Math.ceil(n*0.55);
  while(keys.length<coinTarget&&extra.length)keys.push(extra.pop());
  const coins=keys.map(C);
  const objs=[];
  while(objs.length<n-coins.length)objs.push(...shuffle(L1_OBJS));
  const out=shuffle(coins.concat(objs.slice(0,n-coins.length)));
  for(let i=1;i<out.length;i++) // no identical card twice in a row
    if(out[i].key===out[i-1].key)
      for(let j=0;j<out.length;j++)
        if(j!==i&&out[j].key!==out[i-1].key&&(j===0||out[j-1].key!==out[i].key)&&(j===out.length-1||out[j+1].key!==out[i].key)){
          [out[i],out[j]]=[out[j],out[i]];break;
        }
  return out;
}

// repeat + shuffle a set of coin keys to a target deck length
function deckN(keys,n){const base=keys.map(C);const out=[];while(out.length<n)out.push(...shuffle(base));return shuffle(out.slice(0,n));}

  const r=REAL_COINS.find(r=>r.d===d&&r.f.toLowerCase().includes(f));

// Each distinct design appears EXACTLY ONCE per deck (no padding) so tray counts are exact.

/* ---------------- learning model: AI follows the child's labels ---------------- */
function makeModel(){
  return {
    data:new Map(), // key -> {counts:{label:n}, firstPhase}
    train(key,label,phase){
      if(!this.data.has(key))this.data.set(key,{counts:{},firstPhase:phase});
      const e=this.data.get(key);e.counts[label]=(e.counts[label]||0)+1;
    },
    untrain(key,label){
      const e=this.data.get(key);if(!e)return;
      e.counts[label]--;if(e.counts[label]<=0)delete e.counts[label];
      if(!Object.keys(e.counts).length)this.data.delete(key);
    },
    predict(key){
      const e=this.data.get(key);if(!e)return null;
      let best=null,n=-1;
      for(const[l,c]of Object.entries(e.counts))if(c>n){n=c;best=l;}
      return best;
    },
    phaseOf(key){const e=this.data.get(key);return e?e.firstPhase:null;}
  };
}
const coinModel=makeModel();   // 'coin' | 'notcoin'

  STAGE_W=Math.round(Math.min(3200,Math.max(1440,w/h*900)));

function mapStall(px,py){
  const NW=1672,NH=941,sc=Math.max(STAGE_W/NW,900/NH);
  const ox=(STAGE_W-NW*sc)/2,oy=(900-NH*sc)/2;
  return {x:ox+px*sc,y:oy+py*sc,sc};
}

  const img=el.querySelector('img');

  const bottom=Math.min(900,mapStall(0,960).y); // feet run off the bottom edge — no hard crop
  el.style.left=mapStall(34,0).x+'px';
  el.style.top=top+'px';el.style.bottom='auto';
  img.style.height=Math.max(340,bottom-top)+'px';img.style.width='auto';
}
function layoutStallBox(id,cxImg,bottomImg,wImg){
  const el=$('#'+id);if(!el)return;
  const p=mapStall(cxImg,bottomImg),w=wImg*p.sc,img=el.querySelector('img');
  const ratio=(img&&img.naturalWidth)?img.naturalHeight/img.naturalWidth:0.344;
  img.style.width='100%';img.style.height='auto';
  el.style.width=w+'px';
  el.style.left=(p.x-w/2)+'px';
  el.style.top=(p.y-w*ratio)+'px';
}

/* ---------------- speech system ---------------- */
let robotEl=null,robotSize=260;
let bubbleBottom=null; // per-scene override for the speech-bubble vertical position
function setRobot(state){
  if(!robotEl)return;
  const img=robotEl.querySelector('.rimg');
  img.dataset.state=state;
  img.src='Visuals/robot-'+state+'.png';
  img.dataset.fb=robotSVG(state);img.dataset.fbDone='';
  robotEl.querySelector('.qmark')?.remove();
  if(state==='unsure')robotEl.insertAdjacentHTML('beforeend','<div class="qmark">?</div>');
}
let talkTimer=null;
function startTalk(){ if(!robotEl)return; stopTalk();
  let t=false;
  talkTimer=setInterval(()=>{t=!t;const img=robotEl.querySelector('.rimg');
    const base=img.dataset.baseState||'neutral';
    const st=t?'talking':base;
    img.src='Visuals/robot-'+st+'.png';img.dataset.fb=robotSVG(st);img.dataset.fbDone='';},260);
}
function stopTalk(){if(talkTimer){clearInterval(talkTimer);talkTimer=null;}}

/* Word-by-word typewriter: reveals `text` one word at a time into `el`. */
function typeWords(el,text,{speed=90,done}={}){
  const parts=String(text).split(/(\s+)/); // words + the spaces between them
  el.textContent='';let i=0;
  const timer=setInterval(()=>{el.textContent+=parts[i++]||'';
    if(i>=parts.length){clearInterval(timer);done&&done();}},speed);
  return timer;
}
/* typing.mp3 is short, so loop it while a dialogue line types, and stop when it's done. */
let typingLoop=null;
function startTypingLoop(){
  if(muted)return;
  try{
    if(!typingLoop){typingLoop=new Audio('Audio/typing.mp3');typingLoop.loop=true;typingLoop.volume=.5;}
    typingLoop.currentTime=0;typingLoop.play().catch(()=>{});
  }catch(e){}
}
function stopTypingLoop(){if(typingLoop){try{typingLoop.pause();}catch(e){}}}

function say(lines,opts={}){
  return new Promise(resolve=>{
    lines=lines.slice();
    let bubble=$('#bubble');
    if(!bubble){stage.insertAdjacentHTML('beforeend',
      `<div id="bubble"><span class="txt"></span></div>`);
      bubble=$('#bubble');}
    // keep the bubble clear of interactive elements below it
    if(bubbleBottom!=null)bubble.style.bottom=bubbleBottom+'px';
    else if($('#trayrow'))bubble.style.bottom='225px';
    else if($('#labelrow'))bubble.style.bottom='170px';
    else bubble.style.bottom='95px';
    let tz=$('#tapzone');
    if(!tz){stage.insertAdjacentHTML('beforeend','<div id="tapzone"></div>');tz=$('#tapzone');}
    const txt=bubble.querySelector('.txt');
    let cur='',typing=false,idx=0,timer=null;
    function type(line){
      typing=true;cur=line;txt.textContent='';
      // the robot lip-syncs only its own quoted lines, not the narrator's
      if(robotEl&&!opts.noTalk){/^["“]/.test(line.trim())?startTalk():stopTalk();}
      const parts=line.split(/(\s+)/);let wi=0; // reveal word by word
      startTypingLoop(); // typing sound plays for as long as the line is typing
      timer=setInterval(()=>{txt.textContent+=parts[wi++]||'';
        if(wi>=parts.length){clearInterval(timer);typing=false;stopTypingLoop();}},95);
    }
    function next(){
      if(typing){clearInterval(timer);txt.textContent=cur;typing=false;stopTypingLoop();return;}
      if(!lines.length){cleanup();return;}
      type(lines.shift());
    }
    function cleanup(){
      tz.remove();removeEventListener('keydown',onkey);stopTalk();stopTypingLoop();
      if(opts.keepBubble!==true)bubble.remove();
      resolve();
    }
    function onkey(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();sfx('click');next();}}
    tz.onclick=()=>{sfx('click');next();};
    addEventListener('keydown',onkey);
    next();
  });
}

function addRobot(ly,{x=1010,y=330,w=260,state='neutral',right=null,center=false}={}){

function arrowAt(ly,x,y,rot=0){
  const lx=typeof x==='number'?x+'px':x; // accepts calc() strings for edge-anchored arrows
  // rotation lives on an inner wrapper so the bobbing animation doesn't overwrite it
  const inner=rot?`<div style="transform:rotate(${rot}deg)">${ARROW}</div>`:ARROW;
  ly.insertAdjacentHTML('beforeend',
    `<div class="bigArrow" style="left:${lx};top:${y}px">${inner}</div>`);
}
function primaryBtn(ly,label,id='btn-primary'){
  ly.insertAdjacentHTML('beforeend',`<button class="bigbtn primary" id="${id}">${label}</button>`);
  return $('#'+id);
}
function waitBtn(btn){return new Promise(r=>btn.addEventListener('click',()=>{sfx('click');r();},{once:true}));}
function popup(html){ // returns promise resolving with data-val of clicked .pbtn
  return new Promise(r=>{
    stage.insertAdjacentHTML('beforeend',`<div class="overlay fade-in"><div class="panel">${html}</div></div>`);
    const overlay=stage.lastElementChild,panel=overlay.querySelector('.panel');
    overlay.querySelectorAll('.pbtn').forEach(b=>b.onclick=()=>{
      sfx('click');const v=b.dataset.val;overlay.remove();r(v);});
    // type the prompt text word-by-word (pure-text headings/paragraphs), then reveal the buttons
    const textEls=[...panel.querySelectorAll('h3,p')].filter(el=>!el.children.length);
    const row=panel.querySelector('.row');
    if(textEls.length){
      const texts=textEls.map(el=>el.textContent);
      textEls.forEach(el=>el.textContent='');
      if(row)row.style.visibility='hidden';
      let k=0;(function step(){
        if(k>=textEls.length){if(row)row.style.visibility='';return;}
        typeWords(textEls[k],texts[k],{speed:85,done:()=>{k++;setTimeout(step,140);}});
      })();
    }
  });
}
function trayRow(ly,trays){ // trays:[{id,label,color,cls}]
  ly.insertAdjacentHTML('beforeend',`<div id="trayrow">`+trays.map(t=>
    `<div class="tray ${t.cls||''}" id="tray-${t.id}" style="--tc:${t.color}">

       <div class="coins"></div><div class="tcount">0</div><div class="tlabel">${t.label}</div></div>`).join('')+`</div>`);
}
function dropInTray(id,item){
  const tray=$('#tray-'+id);if(!tray)return;
  const c=tray.querySelector('.tcount');c.textContent=+c.textContent+1;

    coins.insertAdjacentHTML('beforeend',imgTag(item));
    if(item.back)coins.lastElementChild.dataset.back='Visuals/'+encodeURI(item.back); // for the flip finale
  }

}

/* =====================================================================
   TRAINING SCENE FACTORY (used by L1, L2, L3)
   ===================================================================== */
async function trainingScene(cfg){
  /* cfg: {phaseIdx, sceneCls, bgFile, question, deck, minCards, buttons:[{label,value,cls,icon,color}],
          model, labelStore, trainPhase, progressHTML?, onProgress?, reinforce:{count:line},
          facts:[{at,emoji,text}], donePrompt:{title,body,more,go}, introLines} */
  setPhase(cfg.phaseIdx);
  const ly=scene(cfg.sceneCls,cfg.bgFile);
  ly.insertAdjacentHTML('beforeend',`<div class="headline">${cfg.question}</div>`);
  addRobot(ly,{right:48,y:300,w:340,state:'neutral'});
  robotEl.style.right='calc(48px + 14%)';robotEl.style.left='auto'; // nudge the robot 14% toward centre
  ly.insertAdjacentHTML('beforeend',`
    <div id="counter"><div class="cardic"></div><span id="cnum">0</span></div>
    <button id="undoBtn" title="Undo last label" disabled>↩</button>
    <div class="qcard" id="q2" style="visibility:hidden;left:calc(50% - 950px);top:305px;opacity:.6"><div class="ph"></div></div>
    <div class="qcard" id="q1" style="visibility:hidden;left:calc(50% - 710px);top:305px;opacity:.82"><div class="ph"></div></div>
    <div class="qcard" id="q0" style="visibility:hidden;left:calc(50% - 470px);top:305px"><div class="ph"></div></div>
    <div id="scanArea" style="left:calc(50% - 200px)"><div class="brackets"><i></i><i></i><i></i><i></i></div><div id="cardslot"></div></div>
    <div id="labelrow">${cfg.buttons.map(b=>
      `<button class="bigbtn label-btn ${b.cls||''}" data-val="${b.value}">
        ${b.icon?`<span class="ic">${b.icon}</span>`:''}${b.label}
        ${b.sub?`<small>${b.sub}</small>`:''}${b.color?`<div class="bar" style="background:${b.color}"></div>`:''}
      </button>`).join('')}</div>`);
  if(cfg.progressHTML)ly.insertAdjacentHTML('beforeend',cfg.progressHTML);
  // continue-mode: no test popup — a Continue button in the lower-right unlocks after minCards
  if(cfg.continueMode)ly.insertAdjacentHTML('beforeend',
    `<button class="bigbtn primary" id="btn-tcontinue" disabled>${cfg.continueLabel||'Continue'}</button>`);

  const deck=cfg.deck.slice();
  let count=0,history=[];
  const cnum=$('#cnum'),undoBtn=$('#undoBtn');
  const labelBtns=[...document.querySelectorAll('#labelrow .label-btn')];
  labelBtns.forEach(b=>b.disabled=true);
  // coin cards auto-flip in the scanner so the child sees BOTH faces; the
  // label buttons stay locked until the flip cycle finishes (real photos only)
  let introDone=false,cardReady=false,flipTimers=[];
  const setLabels=on=>labelBtns.forEach(b=>b.disabled=!on);

  function showCard(item){
    flipTimers.forEach(clearTimeout);flipTimers=[];
    $('#cardslot').innerHTML=
      `<div class="card enter" data-key="${item.key}">
         <div class="flipI">
           <div class="face f"><div class="ph">${imgTag(item)}</div></div>
           <div class="face b">${backTag(item)}</div>
         </div></div>`;
    const c=$('#cardslot .card'); // tap the polaroid to flip it any time
    c.onclick=()=>{c.classList.toggle('flipped');sfx('correct-chime');}; // coin sound on tap
    if(item.back){
      cardReady=false;setLabels(false);
      flipTimers.push(setTimeout(()=>{c.classList.add('flipped');sfx('correct-chime');},2000)); // coin sound on flip
      flipTimers.push(setTimeout(()=>{c.classList.remove('flipped');},3900));
      flipTimers.push(setTimeout(()=>{cardReady=true;if(introDone)setLabels(true);},4200));
    }else{cardReady=true;if(introDone)setLabels(true);}
  }
  function renderQueue(step){ // row of upcoming cards, marching in from the left edge
    [0,1,2].forEach(i=>{
      const q=$('#q'+i);
      q.classList.remove('qstep');
      if(deck[i]){
        q.style.visibility='visible';q.querySelector('.ph').innerHTML=imgTag(deck[i]);
        if(step){void q.offsetWidth;q.classList.add('qstep');} // whole row steps right together
      }
      else q.style.visibility='hidden';
    });
  }

  // cards are on the conveyor from the very start, even while the robot introduces itself
  let cur=deck.shift();showCard(cur);renderQueue();
  if(cfg.introLines){
    let introArrowEl=null;
    if(cfg.introArrow&&robotEl){ // robot nudged to right:calc(48px+14%) → arrow follows 14% left
      arrowAt(ly,'calc(86% - 263px)',205);
      introArrowEl=ly.querySelector('.bigArrow');
    }
    await say(cfg.introLines);
    introArrowEl?.remove();
  }
  introDone=true;if(cardReady)setLabels(true);
  let resolveDone;const done=new Promise(r=>resolveDone=r);
  if(cfg.continueMode)$('#btn-tcontinue').onclick=()=>{sfx('click');resolveDone();};

  async function label(val,btn){
    if(!cur)return;
    // L2/L3 value training: if the chosen value differs from the coin's real denomination,
    // confirm before accepting (a nudge, not a silent correction — the child can still say yes).
    if(cfg.model===valueModel&&cur.denom&&String(cur.denom)!==String(val)){
      sfx('check-again');
      await popup(`<h3>Check once again</h3>
        <p>Look closely at this coin and its value before choosing.</p>
        <div class="row"><button class="pbtn amber" data-val="ok">Check again</button></div>`);
      return; // don't accept — same card stays so the child re-looks and picks again
    }
    sfx('click'); // tab press
    labelBtns.forEach(b=>b.disabled=true);
    btn.classList.add('flash');sfx('learn-pulse');
    cfg.model.train(cur.key,val,cfg.trainPhase);
    cfg.labelStore.push({key:cur.key,label:val});
    history.push({item:cur,label:val});
    count++;cnum.textContent=count;undoBtn.disabled=false;
    if(cfg.continueMode&&count>=cfg.minCards){const cb=$('#btn-tcontinue');cb.disabled=false;cb.classList.add('glowbtn');}
    const cardEl=$('#cardslot .card');
    setRobot('learning'); // head opens; every labeled card is fed to the robot
    { // aim the flight at the robot's open head, measured live so any window size works
      const cr=cardEl.getBoundingClientRect(),rr=robotEl.getBoundingClientRect();
      const sc=stage.getBoundingClientRect().width/STAGE_W;
      stage.style.setProperty('--trx',((rr.left+rr.width/2-(cr.left+cr.width/2))/sc)+'px');
      stage.style.setProperty('--try',((rr.top+rr.height*.12-(cr.top+cr.height/2))/sc)+'px');
    }
    cardEl.classList.add('toRobot');sfx('card-whoosh');
    robotEl.classList.add('rpulse');
    await sleep(800);
    robotEl.classList.remove('rpulse');setRobot('neutral');
    btn.classList.remove('flash');
    cfg.onProgress&&cfg.onProgress(count,history);

    // reinforcement lines + facts
    if(cfg.reinforce&&cfg.reinforce[count]){await say([cfg.reinforce[count]]);}
    const fact=(cfg.facts||[]).find(f=>f.at===count);
    if(fact){sfx('click');await popup(`<div class="factimg">${fact.emoji}</div><h3>Did you know?</h3>
      <p>${fact.text}</p><div class="row"><button class="pbtn amber" data-val="ok">Continue</button></div>`);}

    // done conditions
    if(deck.length===0){resolveDone();return;}
    if(cfg.promptAtMin&&count>=cfg.minCards&&(count-cfg.minCards)%(cfg.promptEvery||8)===0){
      const v=await popup(`<h3>${cfg.donePrompt.title}</h3>${cfg.donePrompt.body?`<p>${cfg.donePrompt.body}</p>`:''}
        <div class="row"><button class="pbtn gray" data-val="more">Train More</button>
        <button class="pbtn amber" data-val="go">${cfg.donePrompt.go}</button></div>`);
      if(v==='go'){resolveDone();return;}
    }
    cur=deck.shift();
    if(!cur){resolveDone();return;}
    showCard(cur);renderQueue(true); // showCard unlocks the labels after both faces are seen
  }
  labelBtns.forEach(b=>b.onclick=()=>label(b.dataset.val,b));
  undoBtn.onclick=async()=>{
    if(!history.length||!cur)return;
    const last=history.pop();sfx('click');
    cfg.model.untrain(last.key,last.label);
    cfg.labelStore.pop();
    count--;cnum.textContent=count;
    if(cfg.continueMode&&count<cfg.minCards){const cb=$('#btn-tcontinue');cb.disabled=true;cb.classList.remove('glowbtn');}
    deck.unshift(cur);cur=last.item;showCard(cur);renderQueue();
    cfg.onProgress&&cfg.onProgress(count,history);
    undoBtn.disabled=!history.length;
  };
  await done;
}

/* =====================================================================
   TEST SCENE FACTORY
   ===================================================================== */
async function testScene(cfg){
  /* cfg:{phaseIdx,sceneCls,bgFile,deck,trays,predict(key)->{tray,kind:'good|bad|warn',chip?,firstUnsureLine?},
         introLines,runLabel,results,arrowRun} */
  setPhase(cfg.phaseIdx);
  const ly=scene(cfg.sceneCls,cfg.bgFile);
  addRobot(ly,{center:true,y:40,w:300,state:'neutral'});
  ly.insertAdjacentHTML('beforeend','<div class="beam" id="beam" style="visibility:hidden"></div>');
  trayRow(ly,cfg.trays);
  const runBtn=primaryBtn(ly,'▶ '+(cfg.runLabel||'Run'),'btn-run');
  runBtn.disabled=true;
  if(cfg.introLines)await say(cfg.introLines);
  runBtn.disabled=false;
  arrowAt(ly,'calc(100% - 178px)',690);
  await waitBtn(runBtn);
  ly.querySelector('.bigArrow')?.remove();
  runBtn.remove();
  $('#beam').style.visibility='visible';
  const wait=async ms=>{await sleep(ms);};

  const results=[];
  for(const item of cfg.deck){
    setRobot('scanning');
    ly.insertAdjacentHTML('beforeend',`<div id="testItem" class="fade-in" style="left:calc(50% - 120px)">${imgTag(item)}</div>`);
    const ti=$('#testItem');
    sfx('click');
    await wait(520); // faster scan under the beam
    const verdict=cfg.predict(item);
    results.push({key:item.key,verdict});
    ti.classList.add(verdict.kind);
    const mark=verdict.kind==='good'?'✓':verdict.kind==='bad'?'✕':'?';
    ti.insertAdjacentHTML('beforeend',`<div class="mark ${verdict.kind}">${mark}</div>`);
    if(verdict.chip)ti.insertAdjacentHTML('beforeend',`<div class="chip">${verdict.chip}</div>`);
    setRobot(verdict.kind==='good'?'happy':verdict.kind==='bad'?'concerned':'unsure');
    sfx(verdict.kind==='good'?'correct-chime':verdict.kind==='bad'?'reject-thud':'unsure-boop');
    if(verdict.kind==='warn'&&verdict.firstUnsureLine){ // says it for EVERY unsure coin, not just once
      await say(verdict.firstUnsureLine,{keepBubble:false});
    }
    await wait(360);
    // fly to tray
    const trayEl=$('#tray-'+verdict.tray);
    if(trayEl){
      const tr=trayEl.getBoundingClientRect(),ir=ti.getBoundingClientRect();
      const s=stage.getBoundingClientRect().width/1440;
      ti.classList.add('flying');
      ti.style.transform=`translate(${(tr.left+tr.width/2-(ir.left+ir.width/2))/s}px,${(tr.top-ir.top)/s}px) scale(.25)`;
      ti.style.opacity='0';
      await wait(360);
      dropInTray(verdict.tray,item);
    }
    ti.remove();
    setRobot('neutral');
    await wait(130);
  }
  $('#beam').style.visibility='hidden';
  if(cfg.showcase){
    setRobot('happy');
    // robot is z-index:10 (above #trayrow z:9); fading alone still lets it swallow taps on the
    // centred coins, so also disable its pointer events during the finale.
    if(robotEl){robotEl.style.transition='opacity .35s';robotEl.style.opacity='0';robotEl.style.pointerEvents='none';}
    await showcaseTrays();
    if(robotEl){robotEl.style.opacity='';robotEl.style.pointerEvents='';}
    setRobot('neutral');
  }
  return results;
}

/* Sort finale: walk the value boxes left→right; each box grows, then every coin
   inside it grows and flips to reveal both faces, one at a time. */
async function showcaseTrays(){
  const trays=[...document.querySelectorAll('#trayrow .tray')].filter(t=>t.id!=='tray-unsure');
  const sr=stage.getBoundingClientRect(),sc=sr.width/STAGE_W;
  for(const tray of trays){
    const imgs=[...tray.querySelectorAll('.coins img')];
    if(!imgs.length)continue;
    // slide the box to screen-centre and enlarge it
    const r=tray.getBoundingClientRect();
    const dx=(sr.left+sr.width/2-(r.left+r.width/2))/sc;
    const dy=(sr.top+sr.height*0.44-(r.top+r.height/2))/sc;
    tray.style.transition='transform .5s ease';tray.style.transformOrigin='center center';
    tray.style.zIndex='30';tray.style.transform=`translate(${dx}px,${dy}px) scale(2.3)`;
    tray.classList.add('tShow');sfx('correct-chime');
    await sleep(620);
    // coins pulse one at a time to invite a tap: tap1 = enlarge for a clear look,
    // tap2 = flip to the other side, tap3 = settle back → next coin pulses.
    for(const img of imgs){
      const front=img.getAttribute('src'),fb=img.dataset.fb||'',back=img.dataset.back||CARD_BACK;
      const scc=document.createElement('div');scc.className='scCoin pulse';
      scc.innerHTML=`<div class="scFlip">
          <div class="scFace f"><img src="${front}" ${fb?`data-fb="${fb}"`:''} alt=""></div>
          <div class="scFace b"><img src="${back}" alt=""></div></div>`;
      img.replaceWith(scc);
      const flip=scc.querySelector('.scFlip');
      await new Promise(resolve=>{
        let taps=0;
        scc.onclick=()=>{
          taps++;
          if(taps===1){scc.classList.remove('pulse');scc.classList.add('grow');sfx('correct-chime');}
          else if(taps===2){flip.classList.add('flip');sfx('correct-chime');}
          else{scc.onclick=null;flip.classList.remove('flip');scc.classList.remove('grow');sfx('correct-chime');setTimeout(resolve,320);}
        };
      });
      scc.replaceWith(img); // restore the plain tray coin
    }
    await sleep(120);
    tray.classList.remove('tShow');tray.style.transform=''; // send the box back to its spot
    await sleep(520);
    tray.style.zIndex='';tray.style.transition='';
  }
}

/* =====================================================================
   SCENES

async function openingScene(){

  // overlay that sits BEHIND the (now transparent) top bar, so the video reaches the very top

  scene('stall',null); // reset scene state; the overlay covers the stage fullscreen

  wrap.innerHTML=
    `<video id="opVid" src="Opening%20video.mp4" playsinline preload="auto"
       style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000"></video>
     <div id="opCap"
       style="position:absolute;left:50%;transform:translateX(-50%);bottom:30px;max-width:66%;
       background:#FFF8E7;color:#33281A;font-size:26px;font-weight:700;line-height:1.3;
       padding:12px 28px;border-radius:14px;border:2px solid #F0E4C6;
       box-shadow:0 4px 16px rgba(0,0,0,.45);text-align:center;display:none"></div>
     <button class="bigbtn" id="opStart"
       style="left:0;right:0;margin:0 auto;width:260px;top:calc(50% - 42px);text-align:center;background:var(--amber);color:#fff;font-size:30px;padding:20px 0;display:none">▶ Play</button>
     <button class="bigbtn" id="opTrain" disabled
       style="right:18px;bottom:18px;background:var(--amber);color:#fff;font-size:17px;padding:11px 25px">Let's train the robot</button>`;
  document.body.appendChild(wrap);
  const vid=$('#opVid'),startBtn=$('#opStart'),trainBtn=$('#opTrain'),cap=$('#opCap');
  vid.muted=muted;
  // Captions synced to the video timeline. Each entry shows from its `t` (seconds) onward.
  const CAPS=[
    {t:0,    text:'Oh no! This box is completely mixed.'},
    {t:3.57, text:'It will take forever to sort these coins.'},
    {t:5.97, text:'Maybe my robot can help if I train it.'}
  ];
  await new Promise(res=>{
    let done=false;const finish=()=>{if(done)return;done=true;res();};
    const complete=()=>{trainBtn.disabled=false;}; // unlock the tab
    vid.addEventListener('timeupdate',()=>{
      const ct=vid.currentTime;
      if(vid.duration&&ct>=vid.duration-2)complete(); // unlock 2s before the video ends
      let txt='';for(const c of CAPS)if(ct>=c.t)txt=c.text;
      cap.textContent=txt;cap.style.display=txt?'':'none';
    });
    const begin=()=>{ // arrive here from the Home "Start" tap → try to autoplay with sound
      startBtn.style.display='none';cap.textContent=CAPS[0].text;cap.style.display='';
      vid.play().catch(()=>{cap.style.display='none';startBtn.style.display='';}); // blocked → offer a Play tap
    };
    startBtn.onclick=()=>{sfx('click');begin();};
    trainBtn.onclick=()=>{sfx('click');finish();}; // no-op while disabled
    vid.addEventListener('ended',complete,{once:true}); // safety net if timeupdate missed it
    vid.addEventListener('error',complete,{once:true}); // missing/unplayable file → let the tab through
    begin();
  });
  wrap.remove(); // tear down the fullscreen video overlay before training begins
  l1Training();
}

async function l1TestIntro(){
  TRACK.current_state='level1_test';
  // 26-card test sampled (with repeats) from the keys the child actually trained on
  const trained=k=>coinModel.data.has(k);
  let coinPool=L1_COINS.filter(i=>trained(i.key));
  let objPool=L1_OBJS.filter(i=>trained(i.key));
  if(!coinPool.length)coinPool=L1_COINS.slice();
  if(!objPool.length)objPool=L1_OBJS.slice();
  const pick=a=>a[Math.floor(Math.random()*a.length)];
  const deck=[];
  for(let i=0;i<44;i++)deck.push(Math.random()<.58?pick(coinPool):pick(objPool)); // larger L1 test data
  for(let i=1;i<deck.length;i++) // avoid the same card twice in a row
    if(deck[i].key===deck[i-1].key){const j=(i+1)%deck.length;[deck[i],deck[j]]=[deck[j],deck[i]];}
  const results=await l1ConveyorTest(deck);
  // guarantee ≥22 "coins" and ≥15 "not coins" for the review, even if Continue was pressed early
  let nc=results.filter(r=>r.verdict.tray==='coins').length;
  let nn=results.filter(r=>r.verdict.tray==='notcoins').length;
  let guard=0;
  while((nc<22||nn<15)&&guard++<600){
    const item=(nc<22)?pick(coinPool):pick(objPool);
    const good=(coinModel.predict(item.key)||'notcoin')==='coin';
    results.push({key:item.key,verdict:{tray:good?'coins':'notcoins',kind:good?'good':'bad'}});
    if(good)nc++;else nn++;
  }
  TRACK.level1_test_results=results;
  await sleep(500);
  l1Review(results);
}

/* L1 test: conveyor layout — queued cards pass one by one under the beam.
   Coins continue along the belt to the right; everything else is dumped down. */
async function l1ConveyorTest(deck){
  setPhase(2);
  const ly=scene('test','bg-sorting-room.png');
  addRobot(ly,{center:true,y:96,w:330,state:'neutral'}); // lower & larger → robot clearly works the scanner
  ly.insertAdjacentHTML('beforeend','<div class="beam" id="beam" style="visibility:hidden"></div>');
  ly.insertAdjacentHTML('beforeend',`
    <div class="qcard" id="q2" style="visibility:hidden;left:calc(50% - 950px);top:400px;opacity:.6"><div class="ph"></div></div>
    <div class="qcard" id="q1" style="visibility:hidden;left:calc(50% - 710px);top:400px;opacity:.82"><div class="ph"></div></div>
    <div class="qcard" id="q0" style="visibility:hidden;left:calc(50% - 470px);top:400px"><div class="ph"></div></div>`);
  function renderTQ(){
    [0,1,2].forEach(i=>{
      const q=$('#q'+i);q.classList.remove('qstep');
      if(deck[i]){q.style.visibility='visible';q.querySelector('.ph').innerHTML=imgTag(deck[i]);
        void q.offsetWidth;q.classList.add('qstep');}
      else q.style.visibility='hidden';
    });
  }
  renderTQ();
  const runBtn=primaryBtn(ly,'▶ Run','btn-run');runBtn.disabled=true;
  await say(['Now let’s see if the robot can identify what coins look like.',
             'Robot will analyze a random set of objects and label them based on your training.']);
  runBtn.disabled=false;
  arrowAt(ly,'calc(100% - 178px)',690);
  await waitBtn(runBtn);
  ly.querySelector('.bigArrow')?.remove();runBtn.remove();
  $('#beam').style.visibility='visible';
  // Continue unlocks in the lower-right once 15 polaroids have been scanned
  let scanned=0,stopEarly=false;
  const contBtn=primaryBtn(ly,'Continue','btn-tcont');contBtn.disabled=true;
  contBtn.onclick=()=>{sfx('click');stopEarly=true;contBtn.disabled=true;};
  const results=[];
  while(deck.length&&!stopEarly){
    const item=deck.shift();renderTQ();
    ly.insertAdjacentHTML('beforeend',
      `<div class="card enter" id="tcard" style="left:calc(50% - 125px);top:430px;width:250px;height:300px;padding:16px 16px 44px">
         <div class="ph">${imgTag(item)}</div></div>`);
    setRobot('scanning');
    await sleep(420); // faster scan under the beam
    const good=(coinModel.predict(item.key)||'notcoin')==='coin';
    results.push({key:item.key,verdict:{tray:good?'coins':'notcoins',kind:good?'good':'bad'}});
    const tc=$('#tcard');
    tc.classList.add(good?'frameGood':'frameBad');
    tc.insertAdjacentHTML('beforeend',`<div class="markbadge ${good?'good':'bad'}">${good?'✓':'✕'}</div>`);
    setRobot(good?'happy':'concerned');sfx(good?'correct-chime':'reject-thud');
    await sleep(300);
    tc.classList.add(good?'passRight':'toDown');
    await sleep(300);
    if(!good)sfx('tray-drop');
    tc.remove();setRobot('neutral');
    scanned++;
    if(scanned>=15){contBtn.disabled=false;contBtn.classList.add('glowbtn');} // unlocks + glows
    await sleep(110);
  }
  contBtn.remove();
  $('#beam').style.visibility='hidden';
  return results;
}

async function l1Review(results){
  TRACK.current_state='level1_results';setPhase(2);
  const toItem=r=>COIN_DB[r.key]||OBJ_DB[r.key];
  const coinsItems=results.filter(r=>r.verdict.tray==='coins').map(toItem).filter(Boolean).slice(0,22);
  const notItems=results.filter(r=>r.verdict.tray==='notcoins').map(toItem).filter(Boolean).slice(0,15);
  const ly=scene('room','bg-sorting-room.png');
  bubbleBottom=12; // keep the speech bubble low so it never overlaps the lowered robot
  ly.insertAdjacentHTML('beforeend',
    `<div class="headline" id="rvHead" style="font-size:40px;top:52px">Robot identified these as coins</div>
     <div id="reviewGrid"></div>
     <button class="tglTab active" id="tglGood" title="Objects identified as coins">✓</button>
     <button class="tglTab" id="tglBad" title="Objects identified as not coins">✕</button>`);
  addRobot(ly,{center:true,y:542,w:176,state:'happy'}); // robot sits lower; dialogue sits below it
  let mode='good';const badKeys=new Set();
  function rowSplit(n){ // top row largest — 22→[8,7,7], 15→[8,7], ≤8→[n]
    if(n<=8)return[n];
    if(n<=15)return[Math.ceil(n/2),Math.floor(n/2)];
    const b=Math.floor(n/3),r=n-b*3;return[b+(r>0?1:0),b+(r>1?1:0),b];
  }
  function cell(i){return `<div class="rItem${badKeys.has(i.key)?' badItem':''}" data-key="${i.key}">
       <div class="flipI"><div class="face f">${imgTag(i)}</div>
       <div class="face b">${backTag(i)}</div></div></div>`;}
  function renderGrid(){
    const items=mode==='good'?coinsItems:notItems;
    $('#rvHead').textContent=mode==='good'?'Robot identified these as coins':'Robot identified these as not coins';
    if(!items.length){$('#reviewGrid').innerHTML='<div style="font-size:26px;opacity:.85">Nothing in this group.</div>';return;}
    const sizes=rowSplit(items.length);let idx=0,html='';
    for(const s of sizes){html+='<div class="rvRow">'+items.slice(idx,idx+s).map(cell).join('')+'</div>';idx+=s;}
    $('#reviewGrid').innerHTML=html;
  }
  $('#reviewGrid').onclick=e=>{ // tap a polaroid: it enlarges, then flips to its back after 3s
    const it=e.target.closest('.rItem');
    if(!it)return;
    sfx('click');
    if(it.classList.contains('zoom')){it.classList.remove('zoom','flipped');clearTimeout(it._ft);return;}
    it.classList.add('zoom');
    clearTimeout(it._ft);
    it._ft=setTimeout(()=>it.classList.add('flipped'),3000);
  };
  function setMode(m){mode=m;sfx('click');
    $('#tglGood').classList.toggle('active',m==='good');
    $('#tglBad').classList.toggle('active',m==='bad');
    renderGrid();
  }
  $('#tglGood').onclick=()=>setMode('good');
  $('#tglBad').onclick=()=>setMode('bad');
  renderGrid();
  await say(['Based on your training, here is what the robot identified as coins.',
             'How did the robot do?']);
  arrowAt(ly,'calc(100% - 128px)',96,180);
  await say(['Switch between objects identified as coins and not coins.']);
  ly.querySelector('.bigArrow')?.remove();
  await say(['Robot only learns from what you show him.']);
  // arrow points down onto the first coin polaroid (row 1 = 8 coins of 128px, centre-anchored calc)
  arrowAt(ly,'calc(50% - 535px)',8);
  await say(['Tap the coins and look at them properly.']);
  ly.querySelector('.bigArrow')?.remove();
  ly.insertAdjacentHTML('beforeend',
    `<button class="bigbtn secondary" id="btn-again" style="left:24px;bottom:24px">Train More</button>`);
  const goBtn=primaryBtn(ly,'Continue','btn-values');
  goBtn.style.right='24px';goBtn.style.bottom='24px';
  $('#btn-again').onclick=()=>{sfx('click');l1Training();};
  goBtn.onclick=async()=>{
    sfx('click');
    const bad=coinsItems.filter(i=>i.key.startsWith('obj-'));
    if(bad.length===0&&coinsItems.length>0){coinTalk();return;}
    goBtn.disabled=true;
    bad.forEach(b=>badKeys.add(b.key));
    setMode('good');
    setRobot('concerned');
    if(bad.length)await say(['Look again. Is everything here really a coin?',
                             'Press Train More to fix it.']);
    else await say(['The robot did not find any coins.','Press Train More to teach it with better examples.']);
  };
}

/* After a clean review: robot moves to center stage and the child reasons
   through what to do next before value-training unlocks. */
async function coinTalk(){
  TRACK.current_state='coin_talk';
  ['#btn-again','#btn-values'].forEach(s=>document.querySelector(s)?.remove());
  setRobot('neutral'); // robot stays at the bottom — do NOT move it to the centre
  await sleep(400);
  await choiceQuiz('We found all the coins. What should we do now?',[
    {txt:'Count how many coins we found',
     fb:'Counting tells us how many coins there are. Will it separate ₹1, ₹2, ₹5, and ₹10?'},
    {txt:'Sort the coins by their values',ok:true,
     fb:'Yes! They are all coins, but they are worth different amounts.'},
    {txt:'Put every coin into one coin box',
     fb:'That keeps the coins together, but their values will still be mixed.'}]);
  await say(['“But I don’t know how to sort the coins by value.”']);
  await choiceQuiz('Why can’t the robot sort them by value yet?',[
    {txt:'It has only learned Coin and Not Coin.',ok:true},
    {txt:'There are too many coins on the table.'},
    {txt:'The coins need to be counted first.'}]);
  l2Training();
}

/* guided multiple-choice: wrong options turn red and shake; feedback leads to the right answer */
function choiceQuiz(question,options){
  return new Promise(res=>{
    const opts=shuffle(options);
    stage.insertAdjacentHTML('beforeend',
      `<div class="overlay fade-in"><div class="panel" style="max-width:640px">
         <h3>${question}</h3>
         <div class="row" style="flex-direction:column;align-items:center;gap:12px">${
           opts.map((o,i)=>`<button class="pbtn choice" data-i="${i}" data-val="${o.ok?'ok':'no'}"
             style="max-width:520px;width:100%">${o.txt}</button>`).join('')}</div>
         <p class="qfb" style="display:none"></p>
       </div></div>`);
    const ov=stage.lastElementChild,fb=ov.querySelector('.qfb');
    ov.querySelectorAll('.pbtn').forEach(b=>b.onclick=()=>{
      const o=opts[+b.dataset.i];
      if(o.ok){
        sfx('correct-chime');
        b.classList.add('rightOpt');
        ov.querySelectorAll('.pbtn').forEach(x=>x.onclick=null);
        if(o.fb){fb.textContent='“'+o.fb+'”';fb.style.display='';}
        setTimeout(()=>{ov.remove();res();},o.fb?2200:700);
      }else{
        sfx('reject-thud');
        b.classList.add('wrongOpt'); // red + vibrate, then reverts after 5s
        b.disabled=true;
        if(o.fb){fb.textContent='“'+o.fb+'”';fb.style.display='';}
        setTimeout(()=>{b.classList.remove('wrongOpt');b.disabled=false;fb.style.display='none';},5000);
      }
    });
  });
}

function denomDotsHTML(perDesign){ // perDesign: max dots per denom

    `<div class="ddrow"><span class="dl" style="color:${DCOLOR[d]}">₹${d}</span>`+

function updateDenomDots(history,phasePrefix){
  const seen={};for(const d of DENOMS)seen[d]=new Set();
  for(const h of history){const c=COIN_DB[h.key];if(c)seen[c.denom].add(c.design+c.cond);}
  for(const d of DENOMS)[...seen[d]].forEach((_,i)=>{const el=$(`#dd-${d}-${i}`);if(el)el.classList.add('f');});
}

async function l2Test(){
  TRACK.current_state='level2_test';
  const deck=L2_TEST.slice();
  const unsureItems=[];
  const results=await testScene({
    phaseIdx:4,sceneCls:'test',bgFile:'bg-sorting-room.png',
    deck,trays:VALUE_TRAYS.concat([{id:'unsure',label:'Unsure ?',color:'#7A5A17',cls:'unsure',art:'box-unsure.png'}]),
    runLabel:'Run Test',showcase:true,
    introLines:['Now the robot will sort the coins by value.'],
    predict(item){
      const p=valueModel.predict(item.key);
      if(p)return{tray:'d'+p,kind:'good',chip:'₹'+p};
      unsureItems.push(item);
      return{tray:'unsure',kind:'warn',chip:'?',firstUnsureLine:['“I am not sure of its value.”','“I will place it in the Unsure Box.”']};
    }
  });
  TRACK.level2_test_results=results;
  // dedupe by key and cap the inspect list so checking every unsure coin stays reasonable
  const uniqUnsure=[...new Map(unsureItems.map(i=>[i.key,i])).values()].slice(0,8);
  TRACK.unsure_coin_ids=uniqUnsure.map(i=>i.key);
  unsureResults(uniqUnsure);
}

    const bk=$('#ins-back'); // flip side shows this coin's real other face when available
    if(it.back){bk.src='Visuals/'+encodeURI(it.back);bk.dataset.fb=CARD_BACK;bk.dataset.fbDone='';}
    else{bk.src=CARD_BACK;delete bk.dataset.fb;}
    $('#ins-chips').innerHTML=`<span class="chip2 value">Value: ₹${it.denom}</span>`;
    $('#ins-count').textContent=`Coin ${idx+1} of ${items.length} · checked ${viewed.size}`;
    $('#ins-prev').disabled=idx===0;
    $('#ins-next').disabled=idx===items.length-1;
    if(viewed.size>=items.length)doneBtn.disabled=false; // Done unlocks only when every unsure coin is checked
    sfx('click');
  }
  $('#ins-flip').onclick=()=>{$('#ins-flip').classList.toggle('flipped');sfx('correct-chime');}; // coin sound on tap
  $('#ins-prev').onclick=()=>{idx=Math.max(0,idx-1);render();};        // child taps ◀ ▶ to move between coins
  $('#ins-next').onclick=()=>{idx=Math.min(items.length-1,idx+1);render();};
  render();
  await waitBtn(doneBtn);
  doneBtn.remove();$('#inspect')?.remove();$('#ins-head')?.remove();
  TRACK.current_state='reflection_conclusion';
  setRobot('neutral');
  // robot glides to the centre of the screen
  robotEl.style.right='auto';robotEl.style.left='calc(50% - 95px)';robotEl.style.top='230px';
  robotEl.style.width='190px';robotEl.style.height='236px';
  await sleep(900);
  const ly2=$('#ly');
  const retrain=primaryBtn(ly2,'Retrain Robot','btn-retrain');
  retrain.style.left='calc(50% - 110px)';retrain.style.right='auto';retrain.style.bottom='auto';retrain.style.top='600px';
  retrain.classList.add('glowbtn');
  arrowAt(ly2,'calc(50% - 45px)',480); // down-pointing arrow onto the Retrain button
  await waitBtn(retrain);
  l3Training();
}

async function l3Training(){
  TRACK.current_state='level3_retraining';
  await trainingScene({
    phaseIdx:6,sceneCls:'room',bgFile:'bg-sorting-room.png',
    question:'Retrain robot with more coins',
    deck:L3_TRAIN,minCards:26,continueMode:true,continueLabel:'Continue',
    buttons:DENOMS.map(d=>({label:'₹'+d,value:String(d),cls:'denom',color:DCOLOR[d]})),
    model:valueModel,labelStore:TRACK.level3_retraining_labels,trainPhase:'retrain',
    introLines:['The value stayed the same, but the coin designs changed.',
                'Let’s show the robot more kinds of each coin.']
  });
  const ly=$('#ly');
  finalTestIntro();
}

async function finalTestIntro(){
  TRACK.current_state='final_test';
  const results=await testScene({
    phaseIdx:6,sceneCls:'test',bgFile:'bg-sorting-room.png',
    deck:FINAL_TEST,
    trays:VALUE_TRAYS.concat([{id:'unsure',label:'Unsure ?',color:'#7A5A17',cls:'unsure',art:'box-unsure.png'}]),
    runLabel:'Run Final Test',showcase:true,
    introLines:['You gave the robot more varied training data.',
                'Do you think the robot will now recognise more coin designs?','Let’s watch.'],
    predict(item){
      const p=valueModel.predict(item.key);
      if(p)return{tray:'d'+p,kind:'good',chip:'₹'+p};
      return{tray:'unsure',kind:'warn',chip:'?',firstUnsureLine:['“I still need help with this design.”']};
    }
  });
  TRACK.final_test_results=results;
  finalReview(results);
}

function confettiBurst(){
  const c=document.createElement('canvas');c.id='confetti';c.width=1440;c.height=900;stage.appendChild(c);
  const ctx=c.getContext('2d');
  const cols=['#F0A82E','#35C4D7','#7BE3A8','#E76A66','#8B5CC7','#FFD98A'];
  const ps=Array.from({length:130},()=>({x:Math.random()*1440,y:-20-Math.random()*300,
    vy:2.4+Math.random()*3,vx:(Math.random()-.5)*2,r:5+Math.random()*7,
    col:cols[Math.floor(Math.random()*cols.length)],rot:Math.random()*6}));
  let t=0;
  (function anim(){
    if(!c.isConnected)return;
    ctx.clearRect(0,0,1440,900);t++;
    for(const p of ps){p.y+=p.vy;p.x+=p.vx;p.rot+=.08;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.col;
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.5);ctx.restore();}
    if(t<260)requestAnimationFrame(anim);else c.remove();
  })();
}

/* tap a tray coin: it pops up big, holds 3s, flips to its back, then settles away */
function bigFlip(item){
  const el=document.createElement('div');
  el.className='bigflip';
  el.innerHTML=`<div class="flipI"><div class="face f"><img src="Visuals/${encodeURI(item.file)}" data-fb="${item.ph}" alt=""></div>
    <div class="face b">${backTag(item)}</div></div>`;
  stage.appendChild(el);sfx('correct-chime'); // coin sound on tap
  requestAnimationFrame(()=>el.classList.add('show'));
  const fi=el.querySelector('.flipI');
  setTimeout(()=>{fi.style.transform='rotateY(180deg)';},3000); // big for 3s, then flip
  setTimeout(()=>{el.classList.remove('show');},6000);          // settle back after another 3s
  setTimeout(()=>el.remove(),6450);
}

async function finalReview(results){
  TRACK.current_state='final_results';setPhase(7);
  const ly=$('#ly');
  setRobot('celebrating');confettiBurst();sfx('celebrate');
  // Coins were already revealed one-by-one in the sort finale, so skip the "How did the robot do?"
  // tab and go straight to the closing screen.
  await say(['Based on your training, the robot sorted these coins by value.',
             'The robot improved because its training examples became more varied.']);
  closingScene();
}

async function closingScene(){
  TRACK.current_state='closing';
  const ly=scene('stall',null);
  ly.insertAdjacentHTML('beforeend',
    `<img class="bg" src="Visuals/bg-fruit-stall.png" alt=""><div class="dim"></div>
     <div class="propbox" id="cl-box">
       <img class="cutout" src="Visuals/sorted%20coin%20box.png" data-fb="${boxSVG('sorted')}" alt="Sorted coin box"></div>
     <div class="sellerbox" id="cl-seller">
       <img class="cutout" src="Visuals/seller-happy.png" data-fb="${sellerSVG('happy')}" alt="Happy fruit seller"></div>
     <div class="badge"><img src="Visuals/badge-complete.png" data-fb="${badgeSVG()}" style="width:200px" alt="Completion badge"></div>`);
  dioramaRelayout=()=>{layoutStallSeller('cl-seller',300);layoutStallBox('cl-box',815,632,300);};
  dioramaRelayout();
  const clb=$('#cl-box img');if(clb)clb.onload=()=>dioramaRelayout();
  addRobot(ly,{right:150,y:330,w:290,state:'celebrating'});
  confettiBurst();sfx('celebrate');
  await say(['You trained the robot to find coins and sort their values.',
             'When new designs appeared, you checked the results and retrained it.',
             'The robot learns from the examples people choose.',
             'What kind of examples would you show the robot next?']);
  const ly2=$('#ly');
  const fin=primaryBtn(ly2,'Finish Mission','btn-finish');
  fin.onclick=()=>{sfx('click');finishScene();};
}


async function finishScene(){
  const ly=scene('stall','bg-fruit-stall.png');
  ly.insertAdjacentHTML('beforeend',
    `<div class="badge" style="top:150px"><img src="Visuals/badge-complete.png" data-fb="${badgeSVG()}" style="width:230px" alt="badge"></div>
     <div class="headline" style="top:430px">Mission complete!</div>
     <div style="position:absolute;top:510px;width:100%;text-align:center;font-size:26px;opacity:.9">
       You trained, tested, inspected, and improved a robot.<br>Remember: the robot learns from the examples people choose.</div>`);
  const btn=primaryBtn(ly,'Play Again');
  btn.onclick=()=>location.reload();
}

/* ---------------- boot ---------------- */
fit();
homeScene();
window.GAME={TRACK,coinModel,valueModel};
</script>
